# my global config
global:
  scrape_interval: 15s 
  evaluation_interval: 15s 
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
rule_files:
  - "alerts.yml"
scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: "node_exporter"

  - job_name: "gaurdrail_app"
    static_configs:
      - targets: ["fastapi:8000"]
        labels:
          app: "gaurdrail_app"
